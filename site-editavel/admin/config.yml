backend:
  name: github
  repo: SEU-USUARIO/SEU-REPOSITORIO   # <-- troque pelo usuario/repositorio do GitHub
  branch: main
  base_url: https://SEU-PROJETO.vercel.app   # <-- troque pela URL que a Vercel te der
  auth_endpoint: api/auth

# Pasta onde as fotos enviadas pelo cliente sao guardadas dentro do repositorio
media_folder: "assets/uploads"
public_folder: "assets/uploads"

# Permite que o cliente pre-visualize as alteracoes antes de publicar
publish_mode: simple

locale: "pt"

collections:
  - name: "site"
    label: "Meu site"
    files:
      - file: "content/site.json"
        label: "Conteúdo do site"
        name: "site"
        fields:
          - label: "Marca"
            name: "marca"
            widget: "object"
            fields:
              - { label: "Nome do salão", name: "nome", widget: "string" }
              - { label: "Sigla/inicial do logotipo", name: "logotipo_texto", widget: "string" }
              - { label: "WhatsApp (só números, com DDI e DDD)", name: "whatsapp", widget: "string" }
              - { label: "Link do Instagram", name: "instagram", widget: "string" }
              - { label: "Link de agendamento (Versum)", name: "link_agendamento", widget: "string" }

          - label: "Topo (Hero)"
            name: "hero"
            widget: "object"
            fields:
              - { label: "Etiqueta pequena", name: "tag", widget: "string" }
              - { label: "Título principal", name: "titulo", widget: "string" }
              - { label: "Subtítulo", name: "subtitulo", widget: "text" }
              - { label: "Texto do botão", name: "texto_botao", widget: "string" }
              - { label: "Foto principal", name: "imagem", widget: "image" }

          - label: "Sobre"
            name: "sobre"
            widget: "object"
            fields:
              - { label: "Título", name: "titulo", widget: "string" }
              - { label: "Texto", name: "texto", widget: "text" }
              - { label: "Foto", name: "imagem", widget: "image" }

          - label: "Serviços"
            name: "servicos"
            widget: "object"
            fields:
              - { label: "Título da seção", name: "titulo", widget: "string" }
              - label: "Lista de serviços"
                name: "lista"
                widget: "list"
                fields:
                  - { label: "Nome do serviço", name: "nome", widget: "string" }
                  - { label: "Descrição", name: "descricao", widget: "string" }
                  - { label: "Preço", name: "preco", widget: "string" }

          - label: "Galeria"
            name: "galeria"
            widget: "object"
            fields:
              - { label: "Título da seção", name: "titulo", widget: "string" }
              - label: "Fotos"
                name: "imagens"
                widget: "list"
                field: { label: "Foto", name: "imagem", widget: "image" }

          - label: "Vídeo"
            name: "video"
            widget: "object"
            fields:
              - { label: "Título da seção", name: "titulo", widget: "string" }
              - { label: "Link do YouTube (deixe vazio para ocultar)", name: "url_youtube", widget: "string", required: false }

          - label: "Depoimentos"
            name: "depoimentos"
            widget: "object"
            fields:
              - { label: "Título da seção", name: "titulo", widget: "string" }
              - label: "Lista de depoimentos"
                name: "lista"
                widget: "list"
                fields:
                  - { label: "Nome da cliente", name: "nome", widget: "string" }
                  - { label: "Depoimento", name: "texto", widget: "text" }

          - label: "Contato"
            name: "contato"
            widget: "object"
            fields:
              - { label: "Título da seção", name: "titulo", widget: "string" }
              - { label: "Endereço", name: "endereco", widget: "string" }
              - { label: "Horário de funcionamento", name: "horario", widget: "string" }
              - { label: "Telefone", name: "telefone", widget: "string" }
