<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
<title>Editar site</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/admin.css">
</head>
<body>

  <!-- ===== TELA DE LOGIN ===== -->
  <div id="tela-login" class="tela-login">
    <div class="login-card">
      <div class="login-logo" id="login-logo">✎</div>
      <h1>Painel de edição</h1>
      <p>Entre com sua conta do GitHub para editar o conteúdo do site.</p>
      <button id="btn-login" class="btn-primary btn-large">
        <svg width="20" height="20" viewBox="0 0 16 16" fill="currentColor"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38
        0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58
        1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95
        0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27
        1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54
        1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.01 8.01 0 0 0 16 8c0-4.42-3.58-8-8-8z"/></svg>
        Entrar com GitHub
      </button>
      <p id="login-erro" class="login-erro" hidden></p>
      <p class="login-rodape">Suas alterações são salvas diretamente no repositório do site.</p>
    </div>
  </div>

  <!-- ===== APP ===== -->
  <div id="app" class="app" hidden>

    <!-- Topbar -->
    <header class="topbar">
      <button id="btn-menu" class="icon-btn only-mobile" aria-label="Abrir menu">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 6h18M3 12h18M3 18h18"/></svg>
      </button>
      <div class="topbar-title">
        <span class="topbar-logo" id="topbar-logo">✎</span>
        <span id="topbar-nome">Meu site</span>
      </div>
      <div class="topbar-actions">
        <span id="status-pill" class="status-pill status-ok">Tudo salvo</span>
        <a id="link-ver-site" class="btn-ghost only-desktop" href="#" target="_blank" rel="noopener">Ver site</a>
        <button id="btn-salvar" class="btn-primary" disabled>Salvar alterações</button>
        <button id="btn-sair" class="icon-btn" aria-label="Sair" title="Sair">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 17l5-5-5-5M21 12H9"/></svg>
        </button>
      </div>
    </header>

    <div class="layout">
      <!-- Sidebar -->
      <div id="overlay" class="overlay" hidden></div>
      <nav id="sidebar" class="sidebar">
        <div id="nav-lista" class="nav-lista"></div>
        <a id="link-ver-site-mobile" class="nav-ver-site only-mobile" href="#" target="_blank" rel="noopener">
          Ver site publicado ↗
        </a>
      </nav>

      <!-- Conteúdo -->
      <main id="conteudo" class="conteudo">
        <div id="loading" class="loading-box">
          <div class="spinner"></div>
          <p>Carregando conteúdo do site…</p>
        </div>
        <div id="secoes"></div>
      </main>
    </div>

    <!-- Barra fixa inferior (mobile) -->
    <div class="mobile-savebar only-mobile">
      <span id="status-pill-mobile" class="status-pill status-ok">Tudo salvo</span>
      <button id="btn-salvar-mobile" class="btn-primary" disabled>Salvar</button>
    </div>
  </div>

  <!-- Toast -->
  <div id="toast" class="toast" hidden></div>

  <script src="https://cdn.jsdelivr.net/npm/js-yaml@4.1.0/dist/js-yaml.min.js"></script>
  <script src="js/admin.js"></script>
</body>
</html>
